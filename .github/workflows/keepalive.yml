name: Keep Actions Alive

on:
  schedule:
    - cron: "0 0 * * 5"  # todos los viernes a las 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # ✅ permite hacer push al repo

jobs:
  keepalive:
    name: Keep repo active
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ autentica el checkout con permisos de escritura

      - name: Empty commit to keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push
